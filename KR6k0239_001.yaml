body:
  text: 廣州南海寶象林沙門弘贊編今時禮拜多乖儀則不符教旨或稱名失次而罔諳稱揚讚歎佛之勝德或欠存敬而不知懺悔發願回向若不解法何由捐埃獲福以招極果故經論俱陳五法而深尚禮敬讚德先須至於香臺端身息慮思念聖德目覩尊容雙膝著地手擎香爐而舉偈言戒香定香解脫香光明雲臺遍法界供養十方無量佛聞香普熏證寂滅此偈出華嚴經是五分法身之香今為成頌故文略慧香解脫知見香香為佛使故先獻之或如常香花雲偈亦得但改云及諸獨覺仙若有鮮花即用擎以供養普禮三寶先當讚德隨禮何佛菩薩聖僧依德而讚然其讚詞可取諸經論中偈頌以為申歎若其讚詞不稱人稱德者方可依經旨自述偈讚今略取賢聖所集一百頌偈以讚三寶又凡為禮拜必須先敬三寶三寶是最勝吉祥良祐福田能消衆生業垢却諸魔障所作善事皆獲成就也讚佛云稽首一切出世間三界最尊功德海智者能燒煩惱垢正覺我今歸命禮若能誦禮佛滅罪呪然後禮之大善呪曰娜謨達奢書何切那𤙖一菩陀俱致那𤙖二烏𤙖三二合戶嚕戶嚕四悉馱嚧者儞五娑囉婆囉他六娑達儞七娑婆訶寶幢勝經云此呪十俱致諸佛所説我今亦為憐愍一切衆生持此呪者能令一切嗔惡衆生悉皆歡喜若能日日三時誦呪禮拜者勝禮千萬俱致諸佛功德命終之後得生西方無量壽佛國又云臨命終時得諸佛來迎未來賢劫千佛一一皆得親承供養但有人能常誦此呪者最是不可思議也一心頂禮十方三世一切諸佛世尊須五體投地兩手迎空示接佛足之相乃運想云能禮所禮性空寂感應道交難思議我此道場如帝珠十方諸佛影現中我身影現諸佛前頭面接足歸命禮若禮本師應云釋迦如來影現中禮餘佛菩薩聖僧準上應改讚法云稽首能生死險普竭憂惱貪癡海破彼塵勞罪業山我今歸禮妙法寶一心頂禮十方三世一切尊法想云真空法性如虗空常住法寶難思議我身影現法寶前一心如法歸命禮讚僧云稽首一切佛稱讚八正萬行作莊嚴無為定慧漸圓明我今歸命聖衆寶一心頂禮十方三世一切賢聖僧運想準前此中讚禮兼大小乘僧禮釋迦世尊讚詞或以天上天下無如佛偈或用如來妙色身讚皆可西國禮敬盛陳讚頌如尊者摩嘻哩制吒承佛先記造四百讚及一百五十頌總陳六度明佛勝德文詞婉麗理致清高無著天親馬鳴大士等咸皆祖習初學者不可不知如來金身丈六三十二相八十種好身光一尋眉間玉毫遍照十方如方等經華聚菩薩讚佛偈云世尊色身如金山猶如千日照世間能一切諸苦惱我今稽首大法王一心頂禮本師釋迦牟尼世尊禮彌陀佛華言無量壽佛如觀經云阿彌陀佛身高六十萬億那由他恆河沙由旬眼如四大海水玉毫如五須彌身光如百億三千大千世界然此非凡夫心力所能及以佛力故憶想必得成就但想佛像得無量福況能觀佛具足身相或即作丈六身觀亦得衆德嚴身非數量光明遍照過十方三世如來無與等恆施衆生大慈航一心頂禮西方極樂世界阿彌陀世尊禮彌勒菩薩若據當來人壽八萬歲時下生佛身高三十二丈詳如下生經説若準現在兜率天身則大士色身長十六由旬相好如佛其天寶冠有無量化佛諸化菩薩他方諸大菩薩住天冠中若一念頃稱彌勒名除千二百劫生死之罪但聞名合掌恭敬除五千劫生死之罪若禮敬除百億劫生死之罪如上生經説讚云大士久成等正覺成熟有情居兜率晝夜常轉不退輪龍華三會度無極一心頂禮當來下生彌勒世尊禮文殊菩薩此菩薩具大智辨法王之子諸佛之師示童子相頭有五髻身紫色著寶瓔珞坐寶蓮華云坐獅子者表菩薩説法如獅子吼百獸潛蹤贍部洲中一切衆生皆蒙菩薩德護不可不知若一稱名滅無量罪長無量福當來成佛號普現如來讚云三世如來之導師智願廣大難思議無邊剎海為國土當來普現善逝尊一心頂禮大智文殊師利菩薩摩訶薩禮普賢菩薩具大行願為諸佛長子頭頂花冠身披瓔珞坐寶蓮華或乘六牙白象以表六度萬行若歸依普賢菩薩則十方諸佛菩薩悉皆加護以諸佛菩薩皆因修三密門行普賢行得證聖果故也讚云六牙白象為寶座諸度萬行作嚬呻華藏世界稱長子十方剎土現全身一心頂禮大行普賢菩薩摩訶薩禮觀自在菩薩此菩薩過去已成佛號正法明如來今現為極樂世界補處菩薩當來補阿彌陀佛位成佛號普明高顯吉祥峯王如來但于此界衆生有緣現三十二應而為教化本身紫金色長八十萬億那由他由旬頂有肉髻項有圓光光中有五百化佛五百菩薩舉身光中五道衆生一切色相皆於中現頂上寶天冠中有一立化佛高二十五由旬眉間毫相七寶色流出八萬四千光明臂如紅蓮華色有十八億妙光以為瓔珞掌作五百億雜蓮華色十指端有八萬四千畫文光明柔軟普照一切以此寶手接引衆生如此菩薩但聞其名獲福無量餘如觀經説或不能作是觀者隨心大小亦得那由他者萬億為一那由他四十里為一由旬百億為一俱致讚云寶冠頂佛因帶果過去法明天人師悲願運為千手眼照護羣生不失時一心頂禮大慈大悲觀世音菩薩摩訶薩禮大勢至菩薩此菩薩身量亦如觀音舉身光明照十方國有緣衆生皆悉得見以智慧光普照一切離三塗苦得無量力故號大勢至天冠中有五百寶華一一華有五百寶臺一一臺中十方諸佛淨土皆于中現肉髻上有一寶瓶盛諸光明普現佛事餘如經説讚云頂上寶瓶現佛事一毛孔中見十方舉足震驚諸國上普攝淨人歸樂一心頂禮大勢至菩薩摩訶薩禮地藏菩薩此菩薩身相端嚴威德殊勝唯除如來普賢觀音等無能過者又于此界所有教化亦除普賢觀音等諸大菩薩皆不能及久已獲一切智海功德滿足現化十方以本願力於五濁世化益偏厚速滿一切衆生所求滅諸重罪除諸障礙現得安隱若禮一拜一供養者滅無量罪獲無量福讚云悲願初從救親起分身遍度孰能量地獄未空不成佛我今稽首大誓王一心頂禮地藏菩薩摩訶薩禮虗空藏菩薩此菩薩身披瓔珞頂上華冠中有青色摩尼寶珠若觀此珠則滅無量罪除無量障故修懺中以此菩薩為滅罪主欲求辨慧如虗空藏經説讚云頂上寶珠青光耀滅除衆生罪如空我今稽首懺摩主三障頓消福慧融一心頂禮虗空藏菩薩摩訶薩禮迦葉尊者總持論藏善於訓導宰任弘綱行十二頭陀行身相金色如來以正法眼藏而付囑之讚云德相端嚴如金聚頭陀苦行自終身親傳如來正法眼雞足山中待慈尊一心頂禮大德摩訶迦攝波尊者禮優波離尊者統領四衆善解毗尼藏持律第一是阿難尊者上座故在先禮之讚云得度身先八王子楞嚴會上證圓通弘揚律教毗尼藏佛法由斯住世隆一心頂禮大德優波離尊者禮阿難尊者總持經藏親事如來多聞第一是如來從弟身具三十相讚云多聞衆中稱第一證道身離四威儀結集如來正法藏永作人天度世師一心頂禮大德阿難陀尊者如上各各一禮三禮彌善若更禮餘佛菩薩或十拜百拜各隨自意五悔法一禮敬二懺悔三隨喜四勸請五發願回向如彌勒所問經云佛告阿難彌勒菩薩本求道時不持耳鼻頭目手足身命珍寶妻子國土布施以成佛道但以善權方便安樂之行得致無上正真之道何為善權方便彼晝夜各三時正衣束體下膝著地向十方佛説言我悔一切過勸助衆道德歸命禮諸佛令得無上慧悔過者謂懺悔無始時來身口意所作一切諸惡過失也勸者謂勸請十方一切菩薩未成佛者願速成佛已成佛者願常住在世轉正法輪莫入涅槃利樂有情也助者謂助喜一切凡聖功德於十方界一切衆生永捨疾姤之心其有修學一切功德乃至一毫之善我今悉皆助之隨喜也歸命者謂舉自身命歸依諸佛即是以剎塵身而遍禮剎塵佛也令得無上慧者謂以上四種功德及所修一切之善願悉回向施與一切衆生同圓無上種智正等菩提也凡為懺悔發願不出此之五法然諸經俱陳但彼文廣此文略耳如大金光明經及行願品詳備若樂廣者自當檢閲次當代君親等致敬三寶一心奉為天龍八部護法聖衆頂禮十方常住三寶祝曰惟願天龍八部增益威光擁護正教四衆安和離諸魔障一心奉為國皇大臣宰官護法檀那頂禮十方常住三寶惟願皇圖鞏固帝道遐昌文武祿增興隆三寶玉燭常調士民樂業檀那衍慶不逢三災八難至成無上菩提一心奉為所生父母頂禮十方常住三寶惟願二親增崇福壽智慧圓明若過去父母神超淨土業謝塵勞蓮開上品之華佛授一生之記一心奉為和尚阿闍梨頂禮十方常住三寶惟願和尚闍梨四大安和壽齊法身福智增崇普利一切若過去者應云增崇品位一心代為末法四輩弟子頂禮十方常住三寶惟願四輩弟子善根永固進道無魔速證無上菩提一心代為法界衆生頂禮十方常住三寶惟願法界有情一時同得阿耨多羅三藐三菩提此中或增或減或更有餘願隨自意發之茲不繁述附寶積經彌勒菩薩所問會上五悔偈文略恐哀懇之情不伸餘經文復過長初學難誦今附寶積經偈長短得中以便持誦佛告阿難彌勒往昔行菩薩道晝夜六時偏袒右肩右膝著地合掌頂禮於諸佛前説是偈言我今歸命禮十方一切佛菩薩聲聞衆大仙天眼者亦禮菩提心遠離諸惡道能得生天上乃至證涅槃若我作少罪隨心之所生今對諸佛前懺悔令除滅我今身口意所集諸功德願作菩提因當成無上道十方國土中供養如來者及佛無上智我今盡隨喜有罪悉懺悔是福皆隨喜我今禮諸佛願成無上智十方大菩薩證於十地者我今稽首禮願速證菩提得證菩提已摧伏於魔軍轉妙淨法輪饒益衆生類常願住世間無量俱胝劫擊於大法鼓度脫苦衆生我沒於欲泥貪繩之所繫種種多纏縛願佛垂觀察衆生雖垢重諸佛不厭捨願以大慈悲度脫生死海現在諸世尊過去未來佛所行菩薩道我今願修學具足波羅蜜成就六神通度脫諸衆生證於無上道了知諸法空無相無自性無住無表示不生亦不滅又如大仙尊善了於無我無補特伽羅乃至無壽者於諸布施事不執我我所為安樂衆生施與無慳吝願我所施物不假功用生觀察了知空具施波羅蜜持戒無缺減得佛淨尸羅以無所住故具戒波羅蜜忍辱如四大不生分別心以無瞋恚故具忍波羅蜜願以身心力發起大精進堅固無懈怠具勤波羅蜜以如幻如化及勇猛精進金剛等三昧具禪波羅蜜願證三昧智入於三脫門了三世平等具慧波羅蜜諸佛妙色身光明大威德菩薩精進行願我皆圓滿彌勒名稱者勤修如是行具六波羅蜜安住於十地佛告阿難彌勒菩薩安住如是善巧方便積集無上菩提阿難我昔求道受苦無量乃能積集無上菩提右二十四頌初二歸敬頌第三懺悔頌第四發願頌第五隨喜頌第六以懺悔隨喜禮佛之福回向無上道頌第七八請轉法輪頌第九請佛住世頌第十十一求佛攝受頌亦四弘誓之前二誓第十二隨佛學頌即第三弘誓第十三成無上道頌即第四弘誓第十四法空頌第十五人空頌第十六十七檀度頌先了人法二空今行施等方達三輪體空第十八戒度頌第十九忍度頌第二十進度頌第二十一禪度頌第二十二慧度頌第二十三果圓行滿頌第二十四讚彌勒頌音釋達奢亦作陀舍那𤙖二合烏𤙖二合成唵音娑囉婆二合或作薩婆婆字去聲陀羅尼集經云誦三遍頂禮一拜如是三度禮者除滅一切十惡五逆四重等罪一切障難皆悉消滅勝人禮拜十萬億佛功德此名那謨悉羯囉呪華言禮拜呪頭陀亦云杜多華言抖擻謂行十二事即抖擻三界煩惱矣三災大三災火水風則世界壞矣小三災刀兵飢饉疾疫八難一地獄二畜生三餓鬼四無想天不得見佛聞法五北俱盧州不得見佛聞法六盲聾瘖啞七世智辨聰世人邪智聰利耽習外書不信出世正法八生在佛前佛後由業重緣薄不遇佛出世聞佛説法大仙佛為聖中聖天中天仙中仙故云大覺金仙涅槃華言圓寂謂德無不備名圓障無不盡名寂舊云不生不滅補特伽羅華言數取趣即有情之別稱謂諸衆生數數往來趣向六道中受生也六趣即六道一天二人三修羅四地獄五餓鬼六畜生波羅蜜華言到彼岸謂修此六法自度度他到涅槃岸故亦名六度尸羅華言清涼謂持戒能除煩惱而得清涼也三昧華言正定有百千三昧至等覺地入金剛三昧斷最後微細無明方證佛地三脫門即三解脫門一空二無相三無願
